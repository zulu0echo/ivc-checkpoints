# Foundry config for tx-level gas accounting: isolate mode, solc 0.8.30, evm_version = prague.
[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
solc = "0.8.30"
evm_version = "prague"
optimizer = true
optimizer_runs = 200
# The generated Groth16/KZG NovaDecider needs the IR pipeline (stack-too-deep otherwise).
via_ir = true
# isolate: every top-level call is metered as its own tx (per-tx cold/warm reset, refund
# application, state commit) — the basis for tx-level gas.
isolate = true
# Tests read the prover-generated artifacts and write the gas snapshot for the Python
# comparison harness.
fs_permissions = [
    { access = "read", path = "./generated" },
    { access = "read-write", path = "../results" },
]

[fmt]
line_length = 110
